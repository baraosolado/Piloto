# nginx/copilote.conf
# Copiar para: /etc/nginx/sites-available/copilote
# ln -s /etc/nginx/sites-available/copilote /etc/nginx/sites-enabled/
# Substituir SEU_DOMINIO.COM.BR pelo domínio real.
# Requer certificados Let's Encrypt antes do nginx -t (ex.: certbot certonly --nginx ou certbot --nginx -d ...).

server {
    listen 80;
    listen [::]:80;
    server_name SEU_DOMINIO.COM.BR www.SEU_DOMINIO.COM.BR;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name SEU_DOMINIO.COM.BR www.SEU_DOMINIO.COM.BR;

    # SECURITY.md §8.6–8.9 — hardening na borda (TLS moderno, sem versão do nginx no header Server)
    server_tokens off;
    ssl_protocols TLSv1.2 TLSv1.3;

    ssl_certificate /etc/letsencrypt/live/SEU_DOMINIO.COM.BR/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO.COM.BR/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    access_log /var/log/nginx/copilote-access.log;
    error_log /var/log/nginx/copilote-error.log;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /favicon.ico {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
        log_not_found off;
    }
}
